name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Existing tag to publish, for example v0.6.6"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Show tool versions
        run: |
          python --version
          uv --version

      - name: Install project and test dependencies
        run: uv sync --group dev

      - name: Run Python smoke tests
        run: uv run pytest tests -q

      - name: Build sdist and wheel
        run: uv build --no-sources

      - name: Smoke-test local wheel via uvx and uv tool install
        shell: bash
        run: |
          WHEEL="$(ls dist/grados-*.whl | head -n1)"
          export XDG_DATA_HOME=/tmp/grados-xdg
          export UV_CACHE_DIR=/tmp/grados-uv-cache
          uvx --python ./.venv/bin/python --from "$WHEEL" grados version
          uv tool install --python ./.venv/bin/python "$WHEEL" --force
          BIN_DIR="$(uv tool dir --bin)"
          "$BIN_DIR/grados" version

  publish:
    runs-on: ubuntu-latest
    needs: verify-release
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: uv build --no-sources

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  verify-pypi:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Wait for package to appear on PyPI
        shell: bash
        run: |
          TAG="${{ inputs.publish_ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          export VERSION
          for _ in $(seq 1 30); do
            if curl -fsS https://pypi.org/pypi/grados/json > /tmp/grados-pypi.json; then
              if python - <<'PY'
          import json
          from pathlib import Path
          import os
          version = os.environ["VERSION"]
          data = json.loads(Path("/tmp/grados-pypi.json").read_text(encoding="utf-8"))
          raise SystemExit(0 if version in data.get("releases", {}) else 1)
          PY
              then
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Timed out waiting for grados ${VERSION} on PyPI"
          exit 1

      - name: Verify uv tool install and uvx from PyPI
        shell: bash
        run: |
          export UV_CACHE_DIR=/tmp/grados-uv-cache
          uv tool install grados --force
          BIN_DIR="$(uv tool dir --bin)"
          "$BIN_DIR/grados" version
          uvx grados version
