name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Existing tag to publish, for example v0.6.6"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  verify-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Guard release sequence
        shell: bash
        run: |
          TAG="${{ inputs.publish_ref || github.ref_name }}"
          python scripts/check_release_publish_guard.py --tag "$TAG" --package grados --repo "$GITHUB_WORKSPACE"

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run mypy
        run: uv run mypy src

      - name: Run Python smoke tests
        run: uv run pytest tests -q

      - name: Build sdist and wheel
        run: uv build --native-tls --no-sources

      - name: Smoke-test local wheel via uvx and uv tool install
        shell: bash
        run: |
          WHEEL="$(ls dist/grados-*.whl | head -n1)"
          export XDG_DATA_HOME=/tmp/grados-xdg
          export UV_CACHE_DIR=/tmp/grados-uv-cache
          uvx --python ./.venv/bin/python --from "$WHEEL" grados version
          uv tool install --python ./.venv/bin/python "$WHEEL" --force
          BIN_DIR="$(uv tool dir --bin)"
          "$BIN_DIR/grados" version

      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: verify-release
    environment:
      name: pypi
      url: https://pypi.org/p/grados
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  verify-pypi:
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Wait for package to appear on PyPI
        shell: bash
        run: |
          TAG="${{ inputs.publish_ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          export VERSION
          for _ in $(seq 1 30); do
            if curl -fsS https://pypi.org/pypi/grados/json > /tmp/grados-pypi.json; then
              if python - <<'PY'
          import json
          from pathlib import Path
          import os
          version = os.environ["VERSION"]
          data = json.loads(Path("/tmp/grados-pypi.json").read_text(encoding="utf-8"))
          raise SystemExit(0 if version in data.get("releases", {}) else 1)
          PY
              then
                exit 0
              fi
            fi
            sleep 10
          done
          echo "Timed out waiting for grados ${VERSION} on PyPI"
          exit 1

      - name: Verify uv tool install and uvx from PyPI
        shell: bash
        run: |
          TAG="${{ inputs.publish_ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          VERSION="${TAG#v}"
          export UV_CACHE_DIR=/tmp/grados-uv-cache
          uv tool install "grados==${VERSION}" --force
          BIN_DIR="$(uv tool dir --bin)"
          "$BIN_DIR/grados" version | tee /tmp/grados-tool-version.txt
          grep -Fx "GRaDOS ${VERSION}" /tmp/grados-tool-version.txt
          uvx --no-cache --from "grados==${VERSION}" grados version | tee /tmp/grados-uvx-version.txt
          grep -Fx "GRaDOS ${VERSION}" /tmp/grados-uvx-version.txt
