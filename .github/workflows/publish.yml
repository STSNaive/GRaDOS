name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_ref:
        description: "Existing tag to publish, for example v0.2.1"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests if present
        run: npm test --if-present

      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${{ inputs.publish_ref || github.ref_name }}"
          TAG="${TAG#refs/tags/}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "Tag $TAG does not match package.json version v$VERSION"
            exit 1
          fi

      - name: Verify publish contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish
