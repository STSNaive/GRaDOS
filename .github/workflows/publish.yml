name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests if present
        run: npm test --if-present

      - name: Verify tag matches package version
        run: |
          node -e "const version = require('./package.json').version; const tag = process.env.GITHUB_REF_NAME; if (tag !== `v${version}`) { console.error(`Tag ${tag} does not match package.json version v${version}`); process.exit(1); }"

      - name: Verify publish contents
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        run: npm publish
