name: Sync claude-plugin from main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claude-plugin branch
        uses: actions/checkout@v4
        with:
          ref: claude-plugin
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into claude-plugin
        run: |
          git fetch origin main
          git merge origin/main --no-edit -m "chore: sync from main"

      - name: Sync version fields
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version to $VERSION"

          # Update plugin.json version
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json','utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('.claude-plugin/plugin.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Update marketplace.json plugin version
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json','utf8'));
            m.plugins[0].version = '$VERSION';
            fs.writeFileSync('.claude-plugin/marketplace.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Commit and push
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync version to $(node -p "require('./package.json').version")"
          git push origin claude-plugin
