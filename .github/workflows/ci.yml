name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Run test suite
        run: uv run pytest tests -q

  package:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install project and dev dependencies
        run: uv sync --group dev

      - name: Build sdist and wheel
        run: uv build --native-tls --no-sources

      - name: Smoke-test local wheel via uvx and uv tool install
        shell: bash
        run: |
          WHEEL="$(ls dist/grados-*.whl | head -n1)"
          export XDG_DATA_HOME=/tmp/grados-xdg
          export UV_CACHE_DIR=/tmp/grados-uv-cache
          uvx --python ./.venv/bin/python --from "$WHEEL" grados version
          uv tool install --python ./.venv/bin/python "$WHEEL" --force
          BIN_DIR="$(uv tool dir --bin)"
          "$BIN_DIR/grados" version
